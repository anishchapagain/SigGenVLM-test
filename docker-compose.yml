version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gensig_user
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: gensigllm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gensig_user -d gensigllm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
